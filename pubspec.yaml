name: cw_trainer
description: 'Learn Morse code'
publish_to: 'none'
version: 0.1.0+2
home_page: 'https://github.com/AlexandreZani/cw_trainer'
repository: 'https://github.com/AlexandreZani/cw_trainer'
issue_tracker: 'https://github.com/AlexandreZani/cw_trainer/issues'

environment:
  sdk: '>=3.2.2 <4.0.0'

dependencies:
  audio_service: ^0.18.13
  audio_session: ^0.1.19
  characters: ^1.3.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_pcm_sound: ^1.2.2
  flutter_tts: ^4.0.2
  intl: ^0.19.0
  just_audio: ^0.9.38
  logging: ^1.2.0
  path_provider: ^2.1.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  yaml: 3.1.3
  url_launcher: 6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  test: ^1.25.2

flutter:
  uses-material-design: true
  assets:
  - LICENSE
  - pubspec.yaml
